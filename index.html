<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invoice</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial, sans-serif; }

.bordered-table {
    border-collapse: collapse;
    width: 100%;
}

.bordered-table th, .bordered-table td {
    border: 1px solid black;
    padding: 8px;
    vertical-align: top;
}

.bordered-table th {
    background-color: #f2f2f2;
}

.pdf-content { padding: 20px; }
textarea { overflow: hidden; }

@media print {
    body { min-width: 1024px !important; }

    #quotationContent {
        width: 1024px !important;
        max-width: 1024px !important;
        margin: 0 auto !important;
    }

    table { font-size: 12px; }
    input, textarea { font-size: 12px !important; }
    button { display: none !important; }
}
</style>
</head>

<body class="p-4 md:p-8 bg-gray-50">

<div id="quotationContent" class="max-w-4xl mx-auto bg-white shadow p-6 pdf-content">

    <!-- HEADER -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-red-600">ARFICA COM</h1>
        <p class="text-sm text-red-600">Radio Communication & Accessories</p>
        <p class="text-sm">Jl Gajah Mada, Pasar Glodok Jaya | Glodok City Lt.2 Blok BKS No : 53-54</p>
    </div>

    <!-- INFO -->
    <table class="bordered-table mb-6">
        <tr>
            <td class="w-1/2 space-y-2">
                <div class="flex justify-between gap-2">
                    <span class="font-semibold">No:</span>
                    <input class="border p-1 w-full" type="text" id="invoiceNumber"/>
                </div>
                <div class="flex justify-between gap-2">
                    <span class="font-semibold">Date:</span>
                    <input class="border p-1 w-full" type="text" id="invoiceDate"/>
                </div>
                <div class="flex justify-between gap-2">
                    <span class="font-semibold">Term:</span>
                    <input class="border p-1 w-full" type="text" value="Transfer"/>
                </div>
            </td>

            <td class="w-1/2 space-y-3">
                <div>
                    <p class="font-semibold">To:</p>
                    <textarea rows="2" class="border p-1 w-full resize-none"
                        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">CV ELEXTRA</textarea>
                </div>

                <div>
                    <p class="font-semibold">Alamat Pengiriman:</p>
                    <textarea rows="3" class="border p-1 w-full resize-none"
                        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">Jl.Pademangan</textarea>
                </div>

                <div class="flex justify-between gap-2">
                    <span class="font-semibold">Phone:</span>
                    <input class="border p-1 w-full" type="text" value="0411-423888"/>
                </div>
            </td>
        </tr>
    </table>

    <!-- TABLE -->
    <h2 class="text-xl font-bold mb-2">Invoice</h2>
    <table class="bordered-table mb-4" id="invoiceTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Description</th>
                <th>Qty</th>
                <th>Unit Price</th>
                <th>Amount (IDR)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button id="addRowButton" class="bg-blue-500 text-white px-4 py-2 mb-4" onclick="addRow()">Add Row</button>

    <!-- TOTAL -->
    <table class="bordered-table mb-6">
        <tr>
            <td class="w-3/4 text-right font-bold">Total</td>
            <td id="grandTotal">Rp 0</td>
        </tr>
    </table>

    <!-- PAYMENT -->
    <h2 class="text-xl font-bold mb-3">Payment Detail</h2>

    <div class="space-y-4">

        <div class="grid grid-cols-3 gap-2 items-center">
            <label class="font-semibold">Nama Bank</label>
            <input class="col-span-2 border p-1" type="text" value="Mandiri"/>
        </div>

        <div class="grid grid-cols-3 gap-2 items-center">
            <label class="font-semibold">No. Rekening</label>
            <input class="col-span-2 border p-1" type="text" value="12000-1172-1888"/>
        </div>

        <div class="grid grid-cols-3 gap-2 items-center">
            <label class="font-semibold">A/n</label>
            <input class="col-span-2 border p-1" type="text" value="BASRI"/>
        </div>

        <hr>

        <div class="grid grid-cols-3 gap-2 items-center">
            <label class="font-semibold">Nama Bank</label>
            <input class="col-span-2 border p-1" type="text" value="BCA"/>
        </div>

        <div class="grid grid-cols-3 gap-2 items-center">
            <label class="font-semibold">No. Rekening</label>
            <input class="col-span-2 border p-1" type="text" value="2120-3762-95"/>
        </div>

        <div class="grid grid-cols-3 gap-2 items-center">
            <label class="font-semibold">A/n</label>
            <input class="col-span-2 border p-1" type="text" value="BASRI"/>
        </div>

    </div>

    <button id="exportButton" class="bg-green-500 text-white px-4 py-2 mt-6" onclick="exportToPDF()">Export to PDF</button>
</div>

<script>
function addRow() {
    const table = document.getElementById('invoiceTable').getElementsByTagName('tbody')[0];
    const rowCount = table.rows.length + 1;
    const row = table.insertRow();

    row.innerHTML = `
        <td>${rowCount}</td>
        <td><textarea class="border p-1 w-full"></textarea></td>
        <td><input class="border p-1 w-full" type="number" oninput="calculateAmount(this)"/></td>
        <td><input class="border p-1 w-full" type="text" oninput="calculateAmount(this)"/></td>
        <td><input class="border p-1 w-full" type="text" readonly/></td>
    `;
}

function calculateAmount(element) {
    const row = element.parentElement.parentElement;
    const qty = row.cells[2].getElementsByTagName('input')[0].value;
    const unitPrice = row.cells[3].getElementsByTagName('input')[0].value.replace(/[^0-9]/g, "");
    const amount = row.cells[4].getElementsByTagName('input')[0];

    if (qty && unitPrice) {
        const total = parseFloat(qty) * parseFloat(unitPrice);
        amount.value = `Rp ${total.toLocaleString('id-ID')}`;
    } else {
        amount.value = '';
    }

    calculateTotal();
}

function calculateTotal() {
    const table = document.getElementById('invoiceTable').getElementsByTagName('tbody')[0];
    let total = 0;

    for (let i = 0; i < table.rows.length; i++) {
        const amountInput = table.rows[i].cells[4].getElementsByTagName('input')[0];
        const amount = amountInput.value.replace(/[^0-9]/g, "");
        if (amount) total += parseFloat(amount);
    }

    document.getElementById('grandTotal').innerText = `Rp ${total.toLocaleString('id-ID')}`;
}

function exportToPDF() {
    document.getElementById('addRowButton').style.display = 'none';
    document.getElementById('exportButton').style.display = 'none';

    const element = document.getElementById('quotationContent');

    html2pdf().from(element).set({
        margin: 1,
        filename: 'invoice.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    }).save().then(() => {
        document.getElementById('addRowButton').style.display = 'block';
        document.getElementById('exportButton').style.display = 'block';
    });
}

// INIT

document.addEventListener('DOMContentLoaded', function () {
    const today = new Date();

    document.getElementById('invoiceDate').value =
        today.toLocaleDateString('id-ID', {
            day: '2-digit',
            month: 'long',
            year: 'numeric'
        });

    const day = String(today.getDate()).padStart(2, '0');
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const year = String(today.getFullYear()).slice(-2);

    document.getElementById('invoiceNumber').value =
        `INV/${day}${month}${year}/AC/${month}`;
});
</script>

</body>
</html>
